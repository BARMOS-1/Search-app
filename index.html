<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>機材検索</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1000; }
    #modal.show { display: flex; align-items: flex-end; } /* スマホらしく下から出す */
    #modalContent { 
      background: white; width: 100%; max-height: 90vh; 
      border-radius: 20px 20px 0 0; padding: 20px; overflow: auto; 
      transform: translateY(100%); transition: transform 0.3s ease;
    }
    #modal.show #modalContent { transform: translateY(0); }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 select-none">

<div class="max-w-md mx-auto min-h-screen flex flex-col">
  <header class="sticky top-0 bg-white/80 backdrop-blur-md z-40 p-4 border-b">
    <h1 class="text-xl font-bold">機材検索</h1>
    <div class="mt-3 space-y-2">
      <input id="q" type="search" placeholder="機材名・コードで検索..." class="w-full px-4 py-3 rounded-2xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500" />
      <select id="cat" class="w-full px-4 py-2 rounded-xl bg-gray-100 border-none text-sm"></select>
    </div>
  </header>

  <main class="flex-1 overflow-y-auto">
    <p id="summary" class="p-4 text-xs text-gray-500">読み込み中...</p>
    <div id="list" class="divide-y bg-white"></div>
  </main>

  <footer class="p-4 safe-area-bottom">
    <div id="pager" class="flex justify-center gap-2"></div>
  </footer>
</div>

<div id="modal" onclick="closeModal()">
  <div id="modalContent" onclick="event.stopPropagation()">
    </div>
</div>

<script>
let rawData=[], viewData=[], colMap={}, page=1, pageSize=25;
const el=id=>document.getElementById(id);

async function loadData(){
  const url="https://script.google.com/macros/s/AKfycby0faWengFZ9TdfnX3LX7JBCbGEy5A1Pw4308MJSWISOLDU2d8vjJcQwmOCoOHBwji7Sg/exec";
  try{
    const res=await fetch(url);
    rawData=await res.json();
    initAfterLoad();
  }catch(e){
    el('summary').textContent="エラー: 接続を確認してください";
  }
}

function initAfterLoad(){
  normalizeColumns();
  bindCategoryOptions();
  applyFilters();
}

function normalizeColumns(){
  const map={
    code:['機材コード','code'], category:['区分','category'], name:['機材名','name'],
    weight:['単品重量（kg)','weight'], id:['機材ＣＤ','機材CD','id'], stock:['結束数（本）','stock']
  };
  for(const key in map) colMap[key]=map[key].find(c=>c in rawData[0])||'';
  colMap.baseRegions={
    "北日本": ['宮城仙台第二Base','青森東通Base','福島広野Base','岩手盛岡Base'],
    "関東": ['神奈川愛川Base','茨城つくばBase','茨城中央Base','埼玉久喜Base','千葉大木戸Base','千葉市原Base'],
    "中部": ['東海木曽岬Base','静岡吉田Base','福井鯖江Base','長野飯田Base','石川金沢Base'],
    "関西": ['兵庫神戸Base','大阪枚方Base','Lab.West','大阪摂津Base','滋賀近江八幡Base','兵庫東条Base','和歌山桃山Base']
  };
}

function bindCategoryOptions(){
  const set=new Set();
  rawData.forEach(r=>set.add(r[colMap.category]||'未設定'));
  el('cat').innerHTML='<option value="">すべてのカテゴリ</option>'+[...set].sort().map(v=>`<option>${v}</option>`).join('');
}

const runSearch=_.debounce(()=>{page=1;applyFilters();},300);
el('q').addEventListener('input',runSearch);
el('cat').addEventListener('change',runSearch);

function applyFilters(){
  const kw=(el('q').value||'').toLowerCase();
  const cat=el('cat').value;
  viewData=rawData.filter(r=>{
    if(cat && r[colMap.category]!==cat) return false;
    const name=(r[colMap.name]||'').toLowerCase();
    const code=(r[colMap.id]||'').toLowerCase();
    return name.includes(kw) || code.includes(kw);
  });
  render();
}

function render(){
  const listEl=el('list');
  const start=(page-1)*pageSize;
  const slice=viewData.slice(start, start+pageSize);
  el('summary').textContent=`${viewData.length} 件ヒット`;
  
  listEl.innerHTML=slice.map((r,i)=>`
    <div class="p-4 active:bg-gray-100 flex justify-between items-center" onclick="showModal(${(page-1)*pageSize+i})">
      <div class="flex-1">
        <div class="text-xs text-blue-600 font-bold">${r[colMap.id]}</div>
        <div class="font-bold text-lg leading-snug">${r[colMap.name]}</div>
        <div class="text-sm text-gray-500">重:${r[colMap.weight]}kg / 結:${r[colMap.stock]}</div>
      </div>
      <div class="text-xs bg-gray-100 px-2 py-1 rounded">${r[colMap.category]}</div>
    </div>
  `).join('');
}

function showModal(idx){
  const r = viewData[idx];
  let baseHTML = '';
  for(const region in colMap.baseRegions){
    baseHTML += `<div class="mt-4"><h4 class="text-sm font-bold border-l-4 border-blue-500 pl-2 mb-2">${region}</h4><div class="grid grid-cols-2 gap-2">`;
    colMap.baseRegions[region].forEach(b => {
      const val = r[b] || '–';
      const color = val === '〇' ? 'bg-blue-50 text-blue-700' : (val === '×' ? 'bg-red-50 text-red-700' : 'bg-gray-50');
      baseHTML += `<div class="${color} p-2 rounded text-xs flex justify-between"><span>${b.replace('Base','')}</span><b>${val}</b></div>`;
    });
    baseHTML += `</div></div>`;
  }

  el('modalContent').innerHTML = `
    <div class="flex justify-between items-start mb-4">
      <div>
        <h2 class="text-xl font-bold">${r[colMap.name]}</h2>
        <p class="text-sm text-gray-500">コード: ${r[colMap.id]}</p>
      </div>
      <button onclick="closeModal()" class="p-2 bg-gray-100 rounded-full">✕</button>
    </div>
    <div class="grid grid-cols-2 gap-4 text-center mb-6">
      <div class="bg-gray-100 p-3 rounded-2xl"><p class="text-xs text-gray-500">単重量</p><p class="font-bold">${r[colMap.weight]}kg</p></div>
      <div class="bg-gray-100 p-3 rounded-2xl"><p class="text-xs text-gray-500">結束数</p><p class="font-bold">${r[colMap.stock]}本</p></div>
    </div>
    ${baseHTML}
    <div class="h-10"></div>
  `;
  el('modal').classList.add('show');
}

function closeModal(){ el('modal').classList.remove('show'); }

window.addEventListener('DOMContentLoaded', loadData);
// PWA Service Worker 登録
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
